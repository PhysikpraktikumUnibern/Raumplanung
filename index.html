<!DOCTYPE html>
<html>
  <head>
    <title>"planlos"</title>
  </head>
  <body style="margin:0; display:flex; justify-content:center; align-items:center; height:100vh; background:black;">
    <img id="img" style="max-width:100%; max-height:100%;" />
    <script>
    function loadImage() {
    const now = new Date();
    const minute = now.getMinutes(); // 0–59

    let image;

    if (minute % 2 === 0) {
      image = "2.jpg"; // gerade Minute
    } else {
      image = "1.jpg"; // ungerade Minute
    }

    document.getElementById("img").src = image + "?nocache=" + new Date().getTime();
    }

    loadImage();

    // alle 10 Sekunden prüfen (reagiert schneller)
    setInterval(loadImage, 10 * 1000);
    </script>
  </body>
</html>
