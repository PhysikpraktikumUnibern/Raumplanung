<!DOCTYPE html>
<html>
  <head>
    <title>"planlos"</title>
  </head>
  <body style="margin:0; display:flex; justify-content:center; align-items:center; height:100vh; background:black;">
    <img id="img" style="max-width:100%; max-height:100%;" />
    <script>
  function loadImage() {
    const now = new Date();
    const hour = now.getHours(); // 0–23

    let image;

    if (hour % 2 === 0) {
      image = "2.jpg"; // gerade Stunde
    } else {
      image = "1.jpg"; // ungerade Stunde
    }

    document.getElementById("img").src = image + "?nocache=" + new Date().getTime();
  }

  loadImage();

  // prüft jede Minute neu
  setInterval(loadImage, 60 * 1000);
   </script>
  </body>
</html>
